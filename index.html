<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새 심청전 — The Value of What Remains</title>
<!-- 한국적 감성 폰트 — Noto Sans KR (UI), Noto Serif KR (대사/타이틀) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════
   CSS 변수 — 한국 전통 + 심해 사이버펑크
════════════════════════════════════════════ */
:root {
  --bg:         #0b0f14;           /* 먹색 배경 */
  --jade:       #5ec4b0;           /* 옥색 — Existence */
  --jade-g:     rgba(94,196,176,.28);
  --purple:     #9b5fc0;           /* 자주 — Conversion */
  --purple-g:   rgba(155,95,192,.28);
  --crimson:    #c94040;           /* 단청 붉음 — Surveillance */
  --crimson-g:  rgba(201,64,64,.28);
  --gold:       #c8a84b;           /* 탁한 금색 — Time */
  --gold-g:     rgba(200,168,75,.28);
  --text:       #f2e8d8;           /* 한지색 */
  --warm:       #f8ead0;
  --cold:       #a8d0e8;
  --dim:        #6a8898;
  --glass:      rgba(8,12,20,.90);
  --glass2:     rgba(7,13,20,.93);
  --panel-bg:   rgba(8,14,24,.92);
  --border:     rgba(94,196,176,.18);
  --font-ui:    'Noto Sans KR', sans-serif;
  --font-ser:   'Noto Serif KR', 'Nanum Myeongjo', serif;
  --acc:        var(--jade);
  --acc-g:      var(--jade-g);
}
body.villain {
  --acc:    var(--crimson);
  --acc-g:  var(--crimson-g);
  --border: rgba(201,64,64,.22);
}

/* ═══ 글리치 — Surveillance ≥ 40 ═══ */
body.glitch::after {
  content:'';position:fixed;inset:0;z-index:9990;pointer-events:none;
  background:repeating-linear-gradient(0deg,
    rgba(94,196,176,.018) 0,rgba(94,196,176,.018) 1px,
    transparent 1px,transparent 6px);
  animation:gBody .15s steps(1) infinite;
}
@keyframes gBody {
  0%  {transform:translate(0);clip-path:none}
  20% {transform:translate(-2px,1px) skewX(-.3deg);clip-path:inset(12% 0 58% 0)}
  50% {transform:translate(2px,-1px);clip-path:inset(52% 0 12% 0)}
  75% {transform:translate(-1px,1px);clip-path:none}
  100%{transform:translate(0);clip-path:none}
}

/* ═══ 리셋 ═══ */
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100vh;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-ui);
}

/* 배경 캔버스 */
#bgc{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}

/* ═══ 알림 ═══ */
#nbox{position:fixed;top:76px;right:14px;z-index:900;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.notif{padding:4px 12px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:.5px;border:1px solid;backdrop-filter:blur(8px);font-family:var(--font-ui);animation:nIn .2s ease,nOut .3s ease 2.3s forwards}
.np{color:var(--jade);border-color:var(--jade);background:rgba(94,196,176,.06)}
.nn{color:var(--crimson);border-color:var(--crimson);background:rgba(201,64,64,.06)}
.nu{color:var(--gold);border-color:var(--gold);background:rgba(200,168,75,.06)}
@keyframes nIn {from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes nOut{from{opacity:1}to{opacity:0;transform:translateX(14px)}}

/* ════════════════════════════════════════════
   HUD — 얇고 절제된 의례 UI
════════════════════════════════════════════ */
/* ════════════════════════════════════════════
   HUD 재설계 — 조용한 기록 장치
   구조: 좌(SCENE) | 중(타이틀+서브) | 우(스탯)
   높이 최소화, 문살 패턴 은은하게
════════════════════════════════════════════ */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:600;
  /* 반투명 먹색 배경 */
  background:rgba(5,8,14,.94);
  /* 하단 금색 얇은 라인 */
  border-bottom:1px solid rgba(200,168,75,.18);
  /* 아주 희미한 문살 패턴 (세로선) */
  background-image:repeating-linear-gradient(
    90deg,
    transparent 0,
    transparent 59px,
    rgba(200,168,75,.025) 59px,
    rgba(200,168,75,.025) 60px
  );
  /* 단일 행 3열 구조 */
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  height:54px; /* 수정: 타이틀 확대에 맞춰 높이 조정 */
  padding:0 14px;
  gap:10px;
}

/* 좌측 — SCENE ID */
.hscene{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:40px;
  padding-right:10px;
  border-right:1px solid rgba(200,168,75,.14);
  gap:1px;
}
.hslbl{font-size:5.5px;letter-spacing:2px;color:var(--dim);font-family:var(--font-ui);text-transform:uppercase}
/* 씬 번호 크기 줄임 */
.hsval{font-size:12px;font-weight:600;color:var(--jade);letter-spacing:1px}

/* 중앙 — 타이틀 */
#hud-center{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0px;
}
/* 수정: 한글 타이틀 — 붓글씨 느낌, 금빛 번짐 */
.hud-gtitle{
  font-family:Gungsuh, 궁서, var(--font-ser);
  font-size:20px;          /* 크기 확대 */
  font-weight:400;
  /* 탁한 금색 + 옥색 혼합 그라데이션 */
  background:linear-gradient(to bottom,
    rgba(240,224,192,.96) 0%,
    rgba(200,168,75,.90) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:5px;
  /* 잔잔한 금빛 번짐만 — neon 제거 */
  filter:drop-shadow(0 0 5px rgba(200,168,75,.30))
         drop-shadow(0 1px 2px rgba(0,0,0,.60));
  line-height:1.1;
  /* fallback — SVG로 대체됨 */
}
/* 수정: 영문 서브 — 더 얇고 작게, 이탤릭 금색 */
.hud-gsub{
  font-family:var(--font-ser);
  font-size:7.5px;
  color:rgba(200,168,75,.42);
  letter-spacing:2px;
  font-style:italic;
  font-weight:300;
}

/* 수정: 우측 HUD — 한국적 사이버펑크 기록 장치 */
#hud-right{
  display:flex;align-items:center;
  gap:1px;
  padding-left:14px;
  border-left:1px solid rgba(200,168,75,.16);
}

/* 수정: 스탯 블록 — 넓은 여백, 궁서 기반 타이포 */
.sb{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 11px;           /* 좌우 여백 확대 */
  gap:3px;
  border-right:1px solid rgba(200,168,75,.10); /* 금색 구분선 */
}
.sb:last-of-type{border-right:none}

/* 수정: 변수명 — 궁서체 기반, 자간 넓게, 금빛 기록 느낌 */
.slbl{
  font-family:Gungsuh, 궁서, var(--font-ser);
  font-size:7px;
  letter-spacing:3px;       /* 자간 넓게 */
  color:rgba(200,168,75,.55);
  font-weight:400;
}

/* 수정: 숫자 — 더 크고 선명하게 */
.snum{
  font-size:17px;
  font-weight:600;
  font-family:var(--font-ui);
  line-height:1;
  transition:all .3s;
  letter-spacing:1px;
}

/* 수정: 게이지 — 더 길고 약간 도드라지게 */
.sbar{
  width:52px;
  height:2px;
  background:rgba(255,255,255,.06);
  border-radius:1px;overflow:hidden;
}
.sfill{height:100%;border-radius:1px;transition:width .5s ease}

/* 각 변수 색상 + 은은한 glow */
#sb0 .slbl{color:rgba(94,196,176,.62)}
#sb0 .snum{color:var(--jade);text-shadow:0 0 10px rgba(94,196,176,.32)}
#sb0 .sfill{background:var(--jade)}

#sb1 .slbl{color:rgba(155,95,192,.62)}
#sb1 .snum{color:var(--purple);text-shadow:0 0 10px rgba(155,95,192,.28)}
#sb1 .sfill{background:var(--purple)}

#sb2 .slbl{color:rgba(201,64,64,.62)}
#sb2 .snum{color:var(--crimson);text-shadow:0 0 10px rgba(201,64,64,.28)}
#sb2 .sfill{background:var(--crimson)}

/* 수정: TIME — 핵심 압박 변수, 확실한 금색 강조 */
#sb3 .slbl{
  color:rgba(200,168,75,.80);
  letter-spacing:3px;
}
#sb3 .snum{
  font-size:19px;           /* TIME만 더 크게 */
  font-weight:700;
  color:var(--gold);
  text-shadow:0 0 12px rgba(200,168,75,.55),
              0 0 24px rgba(200,168,75,.22);
}
#sb3 .sbar{width:56px}     /* TIME 게이지도 더 길게 */
#sb3 .sfill{
  background:linear-gradient(to right,var(--gold),rgba(200,168,75,.75));
  box-shadow:0 0 5px rgba(200,168,75,.42);
}

/* 플래그 */
.hud-flags{
  display:flex;gap:4px;align-items:center;
  padding-left:11px;
  border-left:1px solid rgba(200,168,75,.10);
}
.fbadge{
  font-size:6px;padding:2px 5px;
  border-radius:1px;border:1px solid;opacity:.12;
  transition:all .3s;white-space:nowrap;
  font-family:var(--font-ui);cursor:default;letter-spacing:.5px;
}
.fbadge.on{opacity:1;font-weight:600}
.fm{color:var(--purple);border-color:var(--purple)}.fm.on{background:rgba(155,95,192,.10)}
.fc{color:var(--crimson);border-color:var(--crimson)}.fc.on{background:rgba(201,64,64,.10)}
#ikey{
  font-size:6px;padding:2px 5px;
  border:1px solid var(--gold);color:var(--gold);
  border-radius:1px;opacity:0;transition:opacity .3s;
  font-family:var(--font-ui);
}
#ikey.on{opacity:1;background:rgba(200,168,75,.08)}

/* HUD title-bar — 이전 구조 제거용 (grid 방식으로 통합됨) */
#hud-title-bar{display:contents}
#hud-stats{display:contents}

/* ════════════════════════════════════════════
   수정: 인트로 화면 — 전체 배경 블러 + 중앙 선명 연출
   ────────────────────────────────────────────
   레이어 구조 (z-index 낮→높):
     0  #intro-bg-blur  전체 배경 이미지 (강한 블러)
     1  #intro-bg-sharp 중앙 영역만 선명 (mask-image)
     2  #intro-overlay  어두운 그라데이션 오버레이
   100  #intro-cnt      실제 콘텐츠
════════════════════════════════════════════ */
#intro{
  position:fixed;inset:0;z-index:1000;
  background:#07101a;
  display:flex;align-items:center;justify-content:center;
  overflow-y:auto;overflow-x:hidden;
  transition:opacity 0.45s ease;
}
/* intro가 완전히 끝난 상태 — display:none 없이 뒤로 보냄 */
#intro.done{
  opacity:0;
  pointer-events:none;
  z-index:-1;
}

/* 수정: ① 전체 배경 이미지 — 강한 블러 */
#intro-bg-blur{
  position:absolute;inset:0;z-index:0;
  background-size:cover;
  background-position:center center;
  background-repeat:no-repeat;
  filter:blur(24px) brightness(.32) saturate(.6);
  transform:scale(1.10); /* 블러 엣지 숨기기 */
  pointer-events:none;
  transition:filter 1.2s ease;
}
/* 수정: 버튼 클릭 시 블러 약해짐 (문 열리는 느낌) */
#intro.opening #intro-bg-blur{
  filter:blur(8px) brightness(.45) saturate(.8);
}

/* 수정: ② 중앙 문 부분만 선명 — mask-image 타원형 클리핑 */
#intro-bg-sharp{
  position:absolute;inset:0;z-index:1;
  background-size:cover;
  background-position:center center;
  background-repeat:no-repeat;
  /* 수정: 채도·명도 낮춰 타이틀과 경쟁 방지 */
  filter:brightness(.62) saturate(.68) contrast(1.02);
  /* 중앙 타원형만 선명하게 노출 */
  -webkit-mask-image:radial-gradient(ellipse 34% 48% at 50% 50%,
    black 0%, black 38%, rgba(0,0,0,.2) 68%, transparent 80%);
  mask-image:radial-gradient(ellipse 34% 48% at 50% 50%,
    black 0%, black 38%, rgba(0,0,0,.2) 68%, transparent 80%);
  pointer-events:none;
  transition:filter 1.0s ease,
             -webkit-mask-image 1.0s ease,
             mask-image 1.0s ease;
}
/* 수정: 클릭 시 선명 영역 점점 확대 */
/* 수정: 문 열려도 과하게 밝아지지 않음 */
#intro.opening #intro-bg-sharp{
  filter:brightness(.82) saturate(.80) contrast(1.04);
  -webkit-mask-image:radial-gradient(ellipse 75% 85% at 50% 50%,
    black 0%, black 58%, rgba(0,0,0,.3) 78%, transparent 90%);
  mask-image:radial-gradient(ellipse 75% 85% at 50% 50%,
    black 0%, black 58%, rgba(0,0,0,.3) 78%, transparent 90%);
}

/* 수정: ③ 전체 어두운 그라데이션 오버레이 */
#intro-overlay{
  position:absolute;inset:0;z-index:2;pointer-events:none;
  /* 수정: 오버레이 강화 — 타이틀 집중도 높임 */
  background:
    radial-gradient(ellipse 48% 58% at 50% 50%,
      rgba(7,16,26,.02) 0%,
      rgba(7,16,26,.55) 54%,
      rgba(7,16,26,.97) 100%),
    linear-gradient(to bottom,
      rgba(7,16,26,.88) 0%,
      rgba(7,16,26,.28) 28%,
      rgba(7,16,26,.28) 72%,
      rgba(7,16,26,.92) 100%);
}

/* ─── 궁궐문 2패널 프레임 ─── */
#gate-wrap{
  position:relative;
  /* 수정: 가로형 비율 — 문 손잡이 장식이 보이도록 */
  width:min(500px,76vw);
  height:min(288px,35vh);
  margin-bottom:13px;
  overflow:hidden;
  flex-shrink:0;
  border:1px solid rgba(200,168,75,.40);
  box-shadow:
    0 0 0 1px rgba(94,196,176,.10),
    0 0 32px rgba(0,0,0,.70),
    0 0 64px rgba(94,196,176,.06),
    inset 0 0 20px rgba(0,0,0,.40);
}

/* 좌/우 문짝 공통 */
#door-left, #door-right{
  position:absolute;top:0;bottom:0;width:50%;
  overflow:hidden;
  transition:transform 1.15s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
#door-left { left:0;  transform-origin:left center; }
#door-right{ right:0; transform-origin:right center; }

/* 각 문짝 이미지 — 좌우 절반 표시 */
#door-left  .dimg{position:absolute;top:0;left:0; width:200%;height:100%;background-size:cover;background-position:left center;background-repeat:no-repeat}
#door-right .dimg{position:absolute;top:0;right:0;width:200%;height:100%;background-size:cover;background-position:right center;background-repeat:no-repeat}

/* 수정: 문 열림 애니메이션 */
#intro.opening #door-left  { transform:translateX(-100%); }
#intro.opening #door-right { transform:translateX(100%); }

/* 수정: 문 중앙 주변 vignette — 타이틀 가독성 우선 */
#gate-wrap::after{
  content:'';
  position:absolute;inset:0;z-index:3;pointer-events:none;
  background:radial-gradient(ellipse 55% 60% at 50% 50%,
    transparent 0%, transparent 35%,
    rgba(5,9,16,.42) 72%,
    rgba(5,9,16,.70) 100%);
}

/* 수정: 문 열릴 때 중앙에서 옥색 빛 번짐 */
#gate-center-light{
  position:absolute;inset:0;z-index:5;pointer-events:none;
  opacity:0;
  background:radial-gradient(ellipse 48% 68% at 50% 50%,
    rgba(210,255,240,.72) 0%,
    rgba(94,196,176,.30) 38%,
    transparent 68%);
  mix-blend-mode:screen;
  transition:opacity .55s ease;
}
#intro.opening #gate-center-light{ opacity:1; }

/* 수정: 수묵 연꽃 SVG — 문 열린 직후 중앙에서 확대·확산 */
#lotus-bloom{
  position:absolute;left:50%;top:50%;
  width:min(540px,102%);height:min(238px,68%);
  transform:translate(-50%,-50%) scale(.05) scaleX(.15);
  transform-origin:center center;
  pointer-events:none;z-index:6;opacity:0;
  mix-blend-mode:screen;
}
#intro.opening #lotus-bloom{
  animation:
    lotusBloom 1.30s cubic-bezier(.10,.80,.15,1) .32s forwards,
    lotusFade  .40s ease 1.56s forwards;
}
/* 꽃잎 전환 */
#lotus-bloom .bp{
  transition:transform .95s cubic-bezier(.12,.82,.18,1), opacity .75s ease;
}
#intro.opening #lotus-bloom .bp{ opacity:.94; transform:none; }
#intro.opening #lotus-bloom .p1{ transition-delay:.26s; }
#intro.opening #lotus-bloom .p2{ transition-delay:.34s; }
#intro.opening #lotus-bloom .p3{ transition-delay:.42s; }
#intro.opening #lotus-bloom .p4{ transition-delay:.50s; }
#intro.opening #lotus-bloom .brush-lines{ animation:brushStroke .90s ease .52s forwards; }
#intro.opening #lotus-bloom .lotus-core { animation:coreGlow .76s ease .64s forwards; }
#intro.opening #lotus-bloom .lotus-ripple{ animation:rippleSpread 1.08s ease .48s forwards; }

@keyframes lotusBloom{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(.05) scaleX(.15);}
  44% {opacity:1;transform:translate(-50%,-50%) scale(1.04) scaleX(1.0);}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1.25) scaleX(1.08);}
}
@keyframes lotusFade{
  from{opacity:1;}
  to  {opacity:0;transform:translate(-50%,-50%) scale(1.75) scaleX(1.32);}
}
@keyframes brushStroke{
  from{opacity:0;}
  to  {opacity:1;}
}
@keyframes coreGlow{
  from{opacity:0;transform:scale(.15);}
  to  {opacity:1;transform:scale(1);}
}
@keyframes rippleSpread{
  0%  {opacity:0;  transform:scaleX(.18) scaleY(.22);}
  38% {opacity:.70;transform:scaleX(1.90) scaleY(.78);}
  100%{opacity:0;  transform:scaleX(3.50) scaleY(1.00);}
}

/* ─── 인트로 콘텐츠 텍스트 스타일 ─── */

/* 수정: 학번/이름 영역 */
.intro-credit{
  font-family:var(--font-ui);
  font-size:11px;letter-spacing:3px;
  color:rgba(200,168,75,.52);
  margin-bottom:9px;
  padding-bottom:8px;
  width:100%;max-width:480px;text-align:center;
  border-bottom:1px solid rgba(200,168,75,.16);
}

/* 수정: 배경 서술 라인 */
/* 수정: eyebrow — 더 은은하게 */
.intro-eyebrow{
  font-family:var(--font-ser);
  font-size:8px;letter-spacing:3.5px;
  color:rgba(200,168,75,.35);
  margin-bottom:5px;
  font-style:italic;
}

/* 수정: 붓글씨 타이틀 래퍼 */
#brush-title-wrap{
  margin-bottom:5px;
  text-align:center;
  /* 옥색 + 금색 은은한 drop-shadow */
  /* 수정: glow 감소 — 절제된 분위기 */
  filter:drop-shadow(0 0 8px rgba(94,196,176,.10))
         drop-shadow(0 1px 4px rgba(0,0,0,.55));
}

/* 수정: 영문 보조 타이틀 — 얇고 작게, 사이버펑크 정체성 보조 */
.intro-eng-sub{
  font-family:'Courier New', 'Noto Sans KR', monospace;
  font-size:10px;font-weight:400;
  color:rgba(94,196,176,.52);
  letter-spacing:5px;
  margin-bottom:3px;
  text-align:center;
  text-transform:uppercase;
  /* 극히 은은한 glow만 */
  text-shadow:0 0 6px rgba(94,196,176,.22);
}

/* 부제 — The Value of What Remains */
.intro-sub{
  font-family:var(--font-ser);
  font-size:10px;color:rgba(200,168,75,.42);
  letter-spacing:2px;font-style:italic;
  margin-bottom:9px;text-align:center;
}

/* 구분선 */
.wave-rule{display:flex;align-items:center;gap:10px;margin:8px 0}
.wave-rule::before,.wave-rule::after{content:'';width:52px;height:1px;background:linear-gradient(90deg,transparent,rgba(94,196,176,.32))}
.wave-rule::after{background:linear-gradient(90deg,rgba(94,196,176,.32),transparent)}
.wave-rule span{font-size:13px;color:rgba(94,196,176,.48)}

/* 핵심 문구 박스 */
.intro-rule{
  font-family:var(--font-ser);
  font-size:12px;color:rgba(216,207,196,.88);
  max-width:400px;line-height:1.9;
  padding:9px 18px;
  background:rgba(94,196,176,.04);
  border:1px solid rgba(94,196,176,.12);
  border-radius:1px;margin-bottom:8px;
  text-align:center;
}
.intro-rule em{color:rgba(200,168,75,.90);font-style:normal}

/* 변수 안내 카드 */
.intro-stats{
  display:flex;
  border:1px solid rgba(94,196,176,.10);
  border-radius:1px;overflow:hidden;
  margin-bottom:16px;
  backdrop-filter:blur(8px);
  background:rgba(5,10,18,.35);
}
.isi{padding:8px 12px;text-align:center;border-right:1px solid rgba(94,196,176,.08)}
.isi:last-child{border-right:none}
.isin{font-size:7.5px;letter-spacing:1.5px;font-weight:700;margin-bottom:3px;font-family:var(--font-ui)}
.isid{font-size:8.5px;color:var(--dim);font-family:var(--font-ui)}

/* 수정: 시작 버튼 — 절제된 금색 테두리 */
#btnStart{
  background:transparent;
  border:1px solid rgba(200,168,75,.50);
  color:rgba(200,168,75,.88);
  padding:12px 46px;
  font-family:var(--font-ui);
  font-size:13px;letter-spacing:5px;
  cursor:pointer;transition:all .38s;
  position:relative;overflow:hidden;
}
#btnStart::before{
  content:'';position:absolute;inset:0;
  background:rgba(200,168,75,.08);
  transform:scaleX(0);transform-origin:left;transition:transform .38s;
}
#btnStart:hover::before{transform:scaleX(1)}
#btnStart:hover{border-color:rgba(200,168,75,.85);color:#e8dcc8;box-shadow:0 0 20px rgba(200,168,75,.16)}
#btnStart span{position:relative;z-index:1}

/* ════════════════════════════════════════════
   수정: 게임 화면 — 좌우 분할 레이아웃
   ────────────────────────────────────────────
   ┌──────────────┬──────────────┐
   │  씬 비주얼   │  스크립트    │
   │   (58%)      │   (42%)      │
   ├──────────────┴──────────────┤
   │        선택지 (전체폭)       │
   └─────────────────────────────┘
════════════════════════════════════════════ */
#gwrap{
  position:fixed;
  top:var(--hud-h, 54px);
  left:0;right:0;bottom:0;
  z-index:10;
  display:flex;
  flex-direction:column;  /* 상단 분할 + 하단 선택지 */
  max-width:100%;margin:0 auto;
  padding:8px 4px 2px;
  overflow:hidden;
  gap:0;
  align-items:center;
}

/* 상단 영역 — 좌우 분할 */
#game-main{
  flex:1;
  display:grid;
  /* 9:16 영상: 가용 높이 기준으로 영상 너비 자동 계산 */
  grid-template-columns:calc((100vh - var(--hud-h, 54px) - 120px) * 9 / 16) minmax(0, 560px);
  gap:0;
  min-height:0;
  overflow:hidden;
  align-self:center;
  margin:0 auto;
}

/* ── 좌측: 씬 비주얼 이미지 영역 ── */
#simg{
  position:relative;overflow:hidden;
  /* 얇은 금색 프레임 */
  border:1px solid rgba(200,168,75,.22);
  border-right:none;
  border-radius:3px 0 0 3px;
  background:rgba(5,10,18,.72);
  /* 문살 느낌 — 세로선 아주 희미하게 */
  background-image:repeating-linear-gradient(
    90deg,
    transparent 0, transparent 39px,
    rgba(200,168,75,.02) 39px, rgba(200,168,75,.02) 40px
  );
}
#simg canvas{position:absolute;inset:0;width:100%;height:100%}
/* 우측 경계 그라데이션 — 텍스트 영역으로 자연스럽게 */
#simg::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:30%;
  background:linear-gradient(to right,transparent,rgba(5,10,18,.82));
  pointer-events:none;z-index:1;
}
/* 하단 그라데이션도 유지 */
#simg::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:40%;
  background:linear-gradient(transparent,rgba(5,10,18,.55));
  pointer-events:none;z-index:1;
}
#stag{
  position:absolute;top:10px;left:12px;z-index:2;
  font-size:7px;letter-spacing:3px;color:var(--acc);
  background:rgba(5,10,18,.85);padding:3px 8px;
  border-radius:1px;border:1px solid rgba(200,168,75,.20);
  transition:color .3s;font-family:var(--font-ui);
}

/* ── 우측: 스크립트 패널 ── */
#spanel{
  display:flex;flex-direction:column;
  background:rgba(6,10,18,.88);
  border:1px solid rgba(200,168,75,.22);
  border-radius:0 3px 3px 0;
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  overflow:hidden;
  transition:border-color .3s;
  animation:panIn .3s ease;
  max-width:600px;
  /* 아주 희미한 문살 패턴 */
  background-image:repeating-linear-gradient(
    0deg,
    transparent 0, transparent 29px,
    rgba(94,196,176,.025) 29px, rgba(94,196,176,.025) 30px
  );
}
@keyframes panIn{from{opacity:0;transform:translateX(4px)}to{opacity:1;transform:translateX(0)}}

#scene-header{flex-shrink:0;padding:12px 16px 0}
#stitle{
  font-family:var(--font-ui);font-size:13px;font-weight:600;
  color:var(--acc);letter-spacing:.5px;margin-bottom:1px;
  transition:color .3s;
  /* glow 감소 */
  text-shadow:0 0 6px var(--acc-g);
}
#ssub{
  font-size:7.5px;letter-spacing:2px;color:var(--dim);
  text-transform:uppercase;font-family:var(--font-ui);
  opacity:.7;
}
.div{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,168,75,.18),transparent);
  margin:6px 0;
}
#satm{
  font-family:var(--font-ser);font-size:11px;
  color:rgba(185,210,228,.85);font-style:italic;
  line-height:1.65;padding-left:9px;
  border-left:1px solid rgba(200,168,75,.25);
  text-shadow:0 1px 4px rgba(0,0,0,.7);
}
#calert,#lnotice{
  font-family:var(--font-ui);font-size:8.5px;
  padding:4px 8px;border-radius:1px;margin-top:5px;
}
#calert{color:var(--gold);background:rgba(200,168,75,.05);border:1px solid rgba(200,168,75,.14)}
#lnotice{color:var(--crimson);background:rgba(201,64,64,.05);border:1px solid rgba(201,64,64,.14)}

/* 대화 영역 — 스크롤 최소화 */
#darea{
  flex:1;padding:8px 16px 4px;
  overflow-y:auto;overflow-x:hidden;
  min-height:0;
}
#darea::-webkit-scrollbar{width:2px}
#darea::-webkit-scrollbar-track{background:transparent}
#darea::-webkit-scrollbar-thumb{background:rgba(200,168,75,.18);border-radius:1px}

.dl{display:flex;gap:9px;align-items:flex-start;margin-bottom:10px}
.spk{font-family:var(--font-ui);font-size:7px;letter-spacing:1.5px;padding:2px 5px;border-radius:1px;white-space:nowrap;margin-top:3px;flex-shrink:0;border:1px solid}
.sys{color:var(--jade);border-color:rgba(94,196,176,.26);background:rgba(94,196,176,.05)}
.lum{color:var(--crimson);border-color:rgba(201,64,64,.26);background:rgba(201,64,64,.05)}
.dad{color:var(--gold);border-color:rgba(200,168,75,.26);background:rgba(200,168,75,.05)}
.cit{color:var(--purple);border-color:rgba(155,95,192,.26);background:rgba(155,95,192,.05)}
.ser{color:var(--crimson);border-color:rgba(201,64,64,.26);background:rgba(201,64,64,.05)}
.ove{color:#b0c8da;border-color:rgba(176,200,218,.20);background:rgba(176,200,218,.04)}
.sim{color:var(--warm);border-color:rgba(248,234,208,.16);background:rgba(248,234,208,.04)}
.unk{color:#90a0b2;border-color:rgba(144,160,178,.18);background:rgba(144,160,178,.03)}

.dt{font-family:var(--font-ser);font-size:14px;font-weight:400;line-height:1.85;letter-spacing:.15px;color:#f2e8d8;text-shadow:0 1px 6px rgba(0,0,0,.75)}
.dl:has(.sys) .dt,.dl:has(.ser) .dt{color:#b8ddf0;text-shadow:0 1px 6px rgba(0,0,0,.8)}
.dl:has(.lum) .dt{color:#f0b4b4;text-shadow:0 1px 6px rgba(0,0,0,.8)}
.dl:has(.dad) .dt{color:#f8e8c0;text-shadow:0 1px 6px rgba(0,0,0,.8)}
.dl:has(.sim) .dt{color:#f6ead8;text-shadow:0 1px 6px rgba(0,0,0,.8)}
.dl:has(.ove) .dt{color:#c4d8e8;text-shadow:0 1px 6px rgba(0,0,0,.8)}
.dl:has(.cit) .dt{color:#d4c0ec;text-shadow:0 1px 6px rgba(0,0,0,.8)}

.typing::after{content:'｜';animation:blink .8s step-end infinite;color:var(--jade);opacity:.65}
@keyframes blink{0%,100%{opacity:.65}50%{opacity:0}}

/* presult는 choices CSS에서 통합 관리 */
.pf{color:var(--dim);margin-bottom:4px}
.pv{font-size:18px;font-weight:700;margin-bottom:2px}
.po{font-size:9px;letter-spacing:1px}

/* ════════════════════════════════════════════
   수정: 선택지 — 중요한 선택 인터페이스
   가로 배치 유지 | A/B 50/50 | A/B/C 균등
════════════════════════════════════════════ */
#choices{
  flex-shrink:0;
  padding:8px 4px 4px;   /* 상단 패딩 키워 위로 올라온 느낌 */
  display:flex;
  flex-direction:row;
  gap:8px;                  /* 카드 간격 확대 */
  align-items:stretch;
  width:100%;
  max-width:calc((100vh - var(--hud-h, 54px) - 120px) * 9 / 16 + 560px);
}

/* presult */
#presult{
  flex-shrink:0;margin:0 14px 5px;
  background:rgba(5,10,18,.90);
  border:1px solid rgba(200,168,75,.18);
  border-radius:2px;padding:10px 14px;
  font-size:10.5px;font-family:var(--font-ui);
}

/* 수정: 선택지 버튼 — 중요한 선택 인터페이스 */
.cbtn{
  flex:1;
  background:rgba(5,10,20,.84);
  border:1px solid rgba(94,196,176,.20);
  color:#f4eada;
  padding:14px 18px;        /* 패딩 확대 */
  text-align:left;
  font-family:var(--font-ser);  /* 명조체로 — 한국적 감성 */
  font-size:13px;           /* 텍스트 크기 확대 */
  line-height:1.65;         /* 줄간격 확대 */
  cursor:pointer;border-radius:2px;transition:all .22s;
  position:relative;overflow:hidden;
  text-shadow:0 1px 6px rgba(0,0,0,.70);
  border-top-width:2px;
  min-height:72px;          /* 높이 확대 */
  /* 먹색 반투명 + 아주 희미한 문살 */
  background-image:repeating-linear-gradient(
    0deg,
    transparent 0, transparent 22px,
    rgba(200,168,75,.018) 22px, rgba(200,168,75,.018) 23px
  );
}
/* hover — 이동 없이 빛 강조 */
.cbtn:hover{ transform:none; }

/* A → 옥색 */
.ca{ border-top-color:var(--jade); }
.ca:hover{
  background:rgba(94,196,176,.10);
  border-color:rgba(94,196,176,.42);
  box-shadow:0 0 24px rgba(94,196,176,.22),
             inset 0 0 18px rgba(94,196,176,.05);
}
/* B → 탁한 금색 */
.cb{ border-top-color:var(--gold); }
.cb:hover{
  background:rgba(200,168,75,.10);
  border-color:rgba(200,168,75,.40);
  box-shadow:0 0 24px rgba(200,168,75,.20),
             inset 0 0 18px rgba(200,168,75,.05);
}
/* C/위험 → 붉은색 */
.cc{ border-top-color:rgba(201,64,64,.60); }
.cc:hover{
  background:rgba(201,64,64,.09);
  border-color:rgba(201,64,64,.38);
  box-shadow:0 0 24px rgba(201,64,64,.18),
             inset 0 0 18px rgba(201,64,64,.04);
}

/* 수정: 선택지 레이블 [A]/[B]/[C] — 크고 명확하게 */
.clbl{
  font-size:9px;
  letter-spacing:3px;
  margin-bottom:6px;
  font-family:var(--font-ui);
  font-weight:700;
  text-transform:uppercase;
  display:block;
}
.ca .clbl{ color:var(--jade);text-shadow:0 0 6px rgba(94,196,176,.30) }
.cb .clbl{ color:var(--gold);text-shadow:0 0 6px rgba(200,168,75,.28) }
.cc .clbl{ color:rgba(201,64,64,.88) }

/* 수정: 효과값 — 더 크고 읽기 쉽게 */
.ceff{
  font-size:10px;
  color:rgba(120,150,168,.82);
  margin-top:6px;
  font-family:var(--font-ui);
  display:block;
  letter-spacing:.3px;
}

/* 엔딩 */
#ewrap{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.epanel{max-width:500px;width:100%;text-align:center;background:rgba(5,10,18,.95);border:1px solid var(--border);border-radius:3px;backdrop-filter:blur(22px);padding:28px 26px}
.ename{font-family:var(--font-ser);font-size:clamp(24px,4.5vw,50px);font-weight:500;letter-spacing:3px;line-height:1.15;margin-bottom:8px;animation:endR 1.3s ease both}
@keyframes endR{from{opacity:0;transform:translateY(10px);letter-spacing:8px}to{opacity:1;transform:translateY(0);letter-spacing:3px}}
.epanel.happy .ename{color:var(--jade);text-shadow:0 0 24px var(--jade-g)}
.epanel.bad   .ename{color:var(--purple);text-shadow:0 0 24px var(--purple-g)}
.epanel.over  .ename{color:var(--dim)}
.esub{font-family:var(--font-ui);font-size:9px;letter-spacing:3px;color:var(--dim);margin-bottom:18px;text-transform:uppercase}
.etxt{font-family:var(--font-ser);font-size:13px;color:#f2e8d8;line-height:2.1;margin-bottom:18px;text-shadow:0 1px 6px rgba(0,0,0,.7)}
.estats{display:flex;justify-content:center;gap:18px;margin-bottom:20px;flex-wrap:wrap}
.esi{text-align:center}
.esl{font-size:7px;letter-spacing:2px;color:var(--dim);display:block;margin-bottom:2px;font-family:var(--font-ui)}
.esv{font-size:22px;font-weight:700;font-family:var(--font-ui)}
#btnR{background:transparent;border:1px solid var(--border);color:var(--jade);padding:10px 26px;font-family:var(--font-ui);font-size:10px;letter-spacing:3px;cursor:pointer;transition:all .22s;text-transform:uppercase}
#btnR:hover{background:rgba(94,196,176,.07);box-shadow:0 0 10px rgba(94,196,176,.10)}

/* ══════════════════════════════════════════════
   엔딩 영상 오버레이 — HAPPY/BAD 가로, GAME OVER 세로 대응
══════════════════════════════════════════════ */
#endingVideoOverlay{
  position:fixed;inset:0;z-index:1200;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse at center, rgba(94,196,176,.10), transparent 45%),
    rgba(3,6,10,.94);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  padding:24px;
}
#endingVideoBox{
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  gap:12px;
  max-width:96vw;max-height:94vh;
}
#endingVideoTitle{
  font-family:var(--font-ser);
  color:rgba(240,224,192,.86);
  font-size:14px;letter-spacing:3px;
  text-align:center;
  text-shadow:0 0 12px rgba(200,168,75,.22);
}
#endingVideo{
  background:#000;
  border:1px solid rgba(200,168,75,.34);
  box-shadow:0 0 40px rgba(0,0,0,.72), 0 0 24px rgba(94,196,176,.10);
  border-radius:3px;
  object-fit:contain;
}
/* 가로 엔딩: HAPPY / BAD */
#endingVideo.landscape{
  /* 수정: 엔딩 영상이 본편 화면과 비슷한 체감 크기로 보이도록 축소 */
  width:min(68vw,820px);
  height:auto;
  max-height:62vh;
}
/* 세로 엔딩: GAME OVER */
#endingVideo.portrait{
  /* 수정: 세로형 게임오버 영상도 화면을 과하게 채우지 않도록 축소 */
  height:min(68vh,650px);
  width:auto;
  max-width:70vw;
}
#endingVideoClose{
  background:transparent;
  border:1px solid rgba(200,168,75,.45);
  color:rgba(240,224,192,.88);
  padding:9px 22px;
  font-family:var(--font-ui);
  font-size:10px;letter-spacing:2px;
  cursor:pointer;transition:all .22s;
}
#endingVideoClose:hover{
  background:rgba(200,168,75,.08);
  box-shadow:0 0 16px rgba(200,168,75,.12);
}
#btnEndingVideo{
  background:transparent;
  border:1px solid rgba(200,168,75,.55);
  color:rgba(200,168,75,.92);
  padding:10px 24px;
  margin-right:8px;
  font-family:var(--font-ui);
  font-size:10px;letter-spacing:3px;
  cursor:pointer;transition:all .22s;
  text-transform:uppercase;
}
#btnEndingVideo:hover{
  background:rgba(200,168,75,.08);
  box-shadow:0 0 18px rgba(200,168,75,.16);
}


.hidden{display:none!important}
#title{display:none!important}

/* 반응형 */
@media(max-width:600px){
  #hud-title-bar{padding:6px 12px 5px}
  .hud-gtitle{font-size:12px;letter-spacing:2px}.hud-gsub{display:none}
  #hud-stats{height:38px;padding:3px 8px}
  .snum{font-size:11px}.sb{padding:0 4px}
  #gwrap{padding-left:8px;padding-right:8px}
  #simg{max-height:118px}
  #scene-header{padding:7px 12px 0}
  .dt{font-size:13px}
  #darea{padding:5px 12px 3px}
  /* 모바일: 선택지 세로로 복귀 */
  #choices{padding:4px 10px 6px;gap:4px;flex-direction:column}
  .cbtn{padding:7px 11px;font-size:10px;border-top-width:2px}
  #gate-wrap{width:min(360px,88vw);height:min(210px,32vh)}
  #brush-title-wrap svg{width:min(280px,80vw)!important}
  .ename{font-size:clamp(20px,6.5vw,36px)}.epanel{padding:22px 14px}
}
</style>
</head>
<body>

<!-- 배경 캔버스 -->
<canvas id="bgc"></canvas>
<!-- 알림 -->
<div id="nbox"></div>

<!-- ════════════════════════════════════════
     HUD — 3열 단일 행 구조
     좌: SCENE ID | 중: 타이틀 | 우: 스탯
════════════════════════════════════════ -->
<div id="hud" class="hidden">

  <!-- 좌측: SCENE -->
  <div class="hscene">
    <span class="hslbl">SCENE</span>
    <span class="hsval" id="sid">S1</span>
  </div>

  <!-- 수정: 중앙 타이틀 — 붓글씨 SVG 필터 적용 -->
  <div id="hud-center">
    <svg id="hud-title-svg"
         viewBox="0 0 220 28"
         xmlns="http://www.w3.org/2000/svg"
         style="width:min(220px,40vw);height:auto;display:block;overflow:visible">
      <defs>

<script>
/* ══════════════════════════════════════════
   상태 변수 — 원본 유지 (절대 변경 금지)
══════════════════════════════════════════ */
let S={},prev={};
function initS(){
  S={ex:50,cv:0,sv:0,tm:100,
     memLost:false,corrupt:false,adminKey:false,
     loopN:0,cur:'S1'};
}

/* ══════════════════════════════════════════
   수정: openGate — 배경 블러 걷힘 + 문 열림 + 연꽃 bloom
   흐름: 블러 제거 → 문 개폐(200ms) → intro 페이드아웃(1100ms)
   display:none 절대 사용 안 함 (깜박임 방지)
══════════════════════════════════════════ */
function openGate(){
  const intro=document.getElementById('intro');
  const btn=document.getElementById('btnStart');
  if(!intro||!btn||btn.disabled)return;
  btn.disabled=true;
  btn.style.opacity='.25';

  /* STEP 1: 게임 화면을 intro 뒤에서 즉시 준비 */
  initS(); prev={};
  const hud=document.getElementById('hud');
  const gw=document.getElementById('gwrap');
  hud.classList.remove('hidden');
  requestAnimationFrame(()=>{
    const hudH=hud.getBoundingClientRect().height;
    document.documentElement.style.setProperty('--hud-h',hudH+'px');
    gw.classList.remove('hidden');
    renderScene('S1');
  });

  /* STEP 2 (200ms): 문 열림 + 배경 블러 걷힘 */
  setTimeout(()=>{ intro.classList.add('opening'); const doorSfx=new Audio('tts/door.mp3'); doorSfx.volume=0.7; doorSfx.play().catch(()=>{}); }, 200);

  /* STEP 3 (1100ms): intro 를 z-index:-1 뒤로 보냄 (display:none 없이) */
  setTimeout(()=>{ intro.classList.add('done'); }, 1100);
}

/* ══════════════════════════════════════════
   수정: 궁궐문 이미지를 JS로 동적 삽입
   — CSS background-image 에 base64 직접 주입
   — intro-bg-blur, intro-bg-sharp, .dimg 모두 동일 이미지 사용
══════════════════════════════════════════ */

function notif(txt,cls='nu'){
  const c=document.getElementById('nbox'),d=document.createElement('div');

  setTimeout(()=>d.remove(),2800);
}

   HUD 업데이트 — 원본 로직 유지
══════════════════════════════════════════ */
function updateHUD(){
  const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
  document.getElementById('sid').textContent=S.cur;
  document.getElementById('vex').textContent=S.ex;
  document.getElementById('vcv').textContent=S.cv;
  document.getElementById('vsv').textContent=S.sv;
  document.getElementById('vtm').textContent=Math.round(S.tm);
  document.getElementById('bex').style.width=cl(S.ex,0,100)+'%';
  document.getElementById('bcv').style.width=cl(S.cv,0,100)+'%';
  document.getElementById('bsv').style.width=cl(S.sv,0,100)+'%';
  document.getElementById('btm').style.width=cl(S.tm,0,100)+'%';
  document.getElementById('fmem').classList.toggle('on',S.memLost);
  document.getElementById('fcor').classList.toggle('on',S.corrupt);
  document.getElementById('ikey').classList.toggle('on',S.adminKey);
  if(prev.ex!==undefined){
    const d=(k,l)=>{const df=Math.round(S[k]-prev[k]);if(df!==0)notif(`${l} ${df>0?'+':''}${df}`,df>0?'np':'nn')};
    d('ex','EXISTENCE');d('cv','CONVERSION');d('sv','SURVEILLANCE');
    const td=Math.round(S.tm)-Math.round(prev.tm);
    if(td!==0)notif(`TIME ${td>0?'+':''}${td}%`,td>0?'np':'nn');
    if(!prev.memLost&&S.memLost)notif('MEMORY_LOST 활성화','nn');
    if(!prev.corrupt&&S.corrupt)notif('CORRUPTION 활성화','nn');
    if(!prev.adminKey&&S.adminKey)notif('🔑 ADMIN_KEY 획득','nu');
  }
  prev={...S};
  document.body.classList.toggle('glitch',S.sv>=40);
}

function typeText(el,txt,cb){
  el.textContent='';el.classList.add('typing');let i=0;
  function t(){if(i<txt.length){el.textContent+=txt[i++];setTimeout(t,17)}else{el.classList.remove('typing');if(cb)cb()}}
  t();
}

const PAL={
  S1:  ['rgba(32,6,6,1)',  'rgba(55,10,10,1)', 'rgba(72,14,16,1)'],
  S2:  ['rgba(5,10,24,1)', 'rgba(8,16,42,1)',  'rgba(11,22,58,1)'],
  S3:  ['rgba(6,5,18,1)',  'rgba(10,7,30,1)',  'rgba(8,12,40,1)'],
  RE_S3:['rgba(32,4,4,1)','rgba(52,8,8,1)',   'rgba(74,12,12,1)'],
  S4:  ['rgba(4,14,6,1)',  'rgba(5,20,7,1)',   'rgba(6,30,9,1)'],
  S5:  ['rgba(4,11,20,1)', 'rgba(6,17,32,1)',  'rgba(8,25,46,1)'],
  S6:  ['rgba(18,8,4,1)',  'rgba(32,13,5,1)',  'rgba(44,19,7,1)'],
  S7:  ['rgba(12,4,18,1)', 'rgba(20,7,30,1)',  'rgba(28,9,42,1)'],
  S8:  ['rgba(26,3,3,1)',  'rgba(40,5,5,1)',   'rgba(54,8,8,1)'],
  S9:  ['rgba(2,7,20,1)',  'rgba(3,11,30,1)',  'rgba(4,15,42,1)'],
  S10: ['rgba(14,14,18,1)','rgba(22,22,30,1)', 'rgba(30,30,40,1)'],
};
let siFrame=null;
function drawSI(id){
  const c=document.getElementById('sic');if(!c)return;
  if(siFrame)cancelAnimationFrame(siFrame);
  function frame(){
    c.width=c.offsetWidth||800;c.height=c.offsetHeight||150;
    const ctx=c.getContext('2d'),W=c.width,H=c.height,p=PAL[id]||PAL.S1;
    const g=ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,p[0]);g.addColorStop(.5,p[1]);g.addColorStop(1,p[2]);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    const fog=ctx.createRadialGradient(W*.5,H*.4,0,W*.5,H*.4,W*.44);
    fog.addColorStop(0,'rgba(94,196,176,.07)');fog.addColorStop(1,'rgba(94,196,176,0)');
    ctx.fillStyle=fog;ctx.fillRect(0,0,W,H);
    const tm=Date.now()*.001;
    for(let i=0;i<24;i++){
      const px=(Math.sin(i*1.6+tm*.14)*.5+.5)*W;
      const py=(1-((i*.062+tm*.032)%1))*H;
      const a=.04+.028*Math.sin(i*1.3+tm);
      ctx.beginPath();ctx.arc(px,py,.7+Math.sin(i+tm)*.28,0,Math.PI*2);
      ctx.fillStyle=`rgba(94,196,176,${a})`;ctx.fill();
    }
    ctx.strokeStyle='rgba(94,196,176,.07)';ctx.lineWidth=.7;
    for(let row=0;row<3;row++){
      const baseY=H*(.32+row*.20);
      ctx.beginPath();ctx.moveTo(0,baseY);
      for(let x=0;x<=W;x+=8){ctx.lineTo(x,baseY+Math.sin(x*.016+tm*.38+row)*(3+row))}
      ctx.stroke();
    }
    siFrame=requestAnimationFrame(frame);
  }
  frame();
}

const VILLAINS=['루멘-9','세라프'];
function renderScene(id){
  S.cur=id;updateHUD();
  const sc=SCENES[id];if(!sc)return;
  const panel=document.getElementById('spanel');
  panel.style.animation='none';panel.offsetHeight;panel.style.animation='';
  const lns=typeof sc.dialogue==='function'?sc.dialogue(S):sc.dialogue;
  document.body.classList.toggle('villain',lns.some(l=>VILLAINS.includes(l.speaker)));
  /* ── 씬별 영상 출력: S1~S10, RE_S3 모두 video 폴더의 mp4 연결 ── */
  const sic=document.getElementById('sic');
  const simg=document.getElementById('simg');
  let sv=document.getElementById('scene-video');
  const sceneVideoMap={
    S1:'video/S1.mp4',
    S2:'video/S2.mp4',
    S3:'video/S3.mp4',
    S4:'video/S4.mp4',
    S5:'video/S5.mp4',
    S6:'video/S6.mp4',
    S7:'video/S7.mp4',
    S8:'video/S8.mp4',
    S9:'video/S9.mp4',
    S10:'video/S10.mp4',
    RE_S3:'video/RE_S3.mp4'
  };
  const vsrc=sceneVideoMap[id];

  /* ── TTS 오디오 맵 (tts/S1.mp3 ~ tts/S10.mp3) ── */
  const sceneTTSMap={
    S1:'tts/S1.mp3',S2:'tts/S2.mp3',S3:'tts/S3.mp3',
    S4:'tts/S4.mp3',S5:'tts/S5.mp3',S6:'tts/S6.mp3',
    S7:'tts/S7.mp3',S8:'tts/S8.mp3',S9:'tts/S9.mp3',
    S10:'tts/S10.mp3',RE_S3:'tts/S3.mp3'
  };
  /* 기존 TTS 오디오 정지 후 교체 재생 */
  let ta=document.getElementById('scene-tts');
  const tsrc=sceneTTSMap[id];
  if(tsrc){
    if(!ta){
      ta=document.createElement('audio');
      ta.id='scene-tts';
      ta.preload='auto';ta.loop=true;
      document.body.appendChild(ta);
    }
    ta.pause();ta.src=tsrc;ta.load();
    const ttsDelay=(id==='S1')?3500:0;
    setTimeout(()=>ta.play().catch(()=>{}),ttsDelay);
  } else {
    if(ta){ta.pause();ta.src='';}
  }

  if(vsrc){
    if(!sv){
      sv=document.createElement('video');
      sv.id='scene-video';
      sv.autoplay=true;
      sv.muted=true;
      sv.loop=true;
      sv.playsInline=true;
      sv.preload='auto';
      sv.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:1;border-radius:inherit;background:#050a12;';
      simg.appendChild(sv);
    }
    if(!sv.src.endsWith(vsrc)){
      sv.pause();
      sv.src=vsrc;
      sv.load();
    }
    sv.style.display='block';
    sv.play().catch(()=>{});
    sic.style.display='none';
    document.getElementById('stag').style.zIndex='2';
  } else {
    if(sv){sv.style.display='none';sv.pause();}
    sic.style.display='';
    document.getElementById('stag').style.zIndex='';
    drawSI(id);
  }
  document.getElementById('stag').textContent=id;
  document.getElementById('stitle').textContent=sc.title;
  document.getElementById('ssub').textContent=sc.sub||'';
  document.getElementById('satm').textContent=sc.atmosphere||'';
  const ln=document.getElementById('lnotice');
  if(id==='RE_S3'){ln.classList.remove('hidden');ln.textContent=`⚠ RE_S3 루프 — SURVEILLANCE+10 누적 (${S.loopN}회)`}
  else ln.classList.add('hidden');
  const ca=document.getElementById('calert');let ct='';
  if(S.memLost&&['S3','S6'].includes(id))ct+='⚠ MEMORY_LOST — 일부 선택지 제한됨  ';
  if(S.sv>=80)ct+=`⚠ SURVEILLANCE ${S.sv} — 시스템이 당신을 주시하고 있다  `;
  if(S.tm<30)ct+=`⚠ TIME ${Math.round(S.tm)}% — 아버지가 당신을 인식하지 못하고 있다`;
  ct?(ca.classList.remove('hidden'),ca.textContent=ct.trim()):ca.classList.add('hidden');
  const da=document.getElementById('darea');da.innerHTML='';
  document.getElementById('presult').classList.add('hidden');
  document.getElementById('choices').innerHTML='';
  const SC={'시스템':'sys','루멘-9':'lum','아버지':'dad','시민':'cit','세라프':'ser','오버시어':'ove','심청':'sim'};
  let li=0;
  function nextLine(){
    if(li>=lns.length){renderChoices(sc);return}
    const l=lns[li++];
    const dv=document.createElement('div');dv.className='dl';

function renderChoices(sc){

/* ══════════════════════════════════════════
   선택지 처리 — 원본 로직 유지
══════════════════════════════════════════ */
function doChoice(ch){
  if(ch.act)ch.act(S);
  if(S.sv>=95&&ch.next!=='GO'){showEnd('over','감시 폭주');return}
  if(S.tm<=0&&ch.next!=='GO'){showEnd('over','시간 초과');return}
  updateHUD();
  if(ch.special==='illegal'){
    /* S9 불법 치료 — Success_Rate = (cv×0.6)-(sv×0.8) */
    const r=Math.round((S.cv*.6)-(S.sv*.8));
    const pd=document.getElementById('presult');pd.classList.remove('hidden');
    let out,col,nx;
    if(r>=40){out='완전 성공 — S10 진입';col='var(--jade)';nx='S10'}
    else if(r>=0){out='불완전 성공 — 불리한 조건 S10 진입';col='var(--gold)';S.ex=Math.max(0,S.ex-15);nx='S10'}
    else{out='치료 실패 — GAME OVER';col='var(--crimson)';nx='GO'}
    pd.innerHTML=`<div class="pf">Success_Rate = (CV×0.6)−(SV×0.8) = (${S.cv}×0.6)−(${S.sv}×0.8)</div><div class="pv" style="color:${col}">${r>=0?'+':''}${r}</div><div class="po" style="color:${col}">${out}</div>`;
    const ca=document.getElementById('choices');ca.innerHTML='';
    const b=document.createElement('button');b.className='cbtn cc';
    b.innerHTML='<div class="clbl">▶ 계속</div><div>결과를 확인하고 진행합니다.</div>';
    b.onclick=()=>{if(nx==='GO')showEnd('over','불법 치료 실패');else renderScene(nx)};
    ca.appendChild(b);updateHUD();return;
  }
  if(ch.next==='S10'){renderScene('S10');return}
  if(ch.next==='GO'){showEnd('over','');return}
  if(ch.next==='END'){judgeEnd();return}
  renderScene(ch.next);
}

/* ══════════════════════════════════════════

}

/* ══════════════════════════════════════════
   엔딩 영상 재생 — happy/bad는 가로, over는 세로 영상
   파일 위치: index.html과 같은 폴더 기준 video/ 폴더
══════════════════════════════════════════ */
function getEndingVideoConfig(type){
  const map={
    happy:{src:'video/END_H.mp4', cls:'landscape', title:'HAPPY ENDING — 남겨진 기록'},
    bad:{src:'video/END_B.mp4', cls:'landscape', title:'BAD ENDING — 변환 기록'},
    over:{src:'video/G_OVER.mp4', cls:'portrait', title:'GAME OVER — 최후 기록'}
  };
  return map[type]||map.bad;
}

function playEndingVideo(type){
  const cfg=getEndingVideoConfig(type);
  const ov=document.getElementById('endingVideoOverlay');
  const v=document.getElementById('endingVideo');
  const title=document.getElementById('endingVideoTitle');
  if(!ov||!v)return;

  title.textContent=cfg.title;
  v.pause();
  v.removeAttribute('src');
  v.load();
  v.className=cfg.cls;
  v.src=cfg.src;
  ov.classList.remove('hidden');

  const playPromise=v.play();
  if(playPromise&&playPromise.catch){
    playPromise.catch(()=>{
      /* 브라우저 자동재생이 막히면 컨트롤 버튼으로 수동 재생 */
    });
  }
}

function closeEndingVideo(){
  const ov=document.getElementById('endingVideoOverlay');
  const v=document.getElementById('endingVideo');
  if(v){v.pause();v.currentTime=0;}
  if(ov)ov.classList.add('hidden');
}

/* ══════════════════════════════════════════
   시작 / 재시작
══════════════════════════════════════════ */
function startGame(){
  initS();prev={};
  document.getElementById('title').classList.add('hidden');
  const hud=document.getElementById('hud');
  hud.classList.remove('hidden');
  requestAnimationFrame(()=>{
    const h=hud.getBoundingClientRect().height;
    document.documentElement.style.setProperty('--hud-h',h+'px');
    document.getElementById('gwrap').classList.remove('hidden');
    renderScene('S1');
  });
}
function restart(){
  document.getElementById('ewrap').classList.add('hidden');
  document.getElementById('ewrap').innerHTML='';
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('gwrap').classList.remove('hidden');
  initS();prev={};
  requestAnimationFrame(()=>{
    const h=document.getElementById('hud').getBoundingClientRect().height;
    document.documentElement.style.setProperty('--hud-h',h+'px');
    renderScene('S1');
  });
}

/* ══════════════════════════════════════════
   배경 캔버스 — 심해 + 먹 번짐 + 기포 + 파도
══════════════════════════════════════════ */
(function(){
  const cv=document.getElementById('bgc'),ctx=cv.getContext('2d');
  const WV=Array.from({length:7},(_,i)=>({y:.35+i*.09,amp:10+i*3,freq:.003-i*.0002,speed:.0002+i*.00008,ph:Math.random()*Math.PI*2,al:.065-i*.005}));
  const BB=Array.from({length:55},()=>({x:Math.random(),y:Math.random(),r:.5+Math.random()*1.4,speed:.0003+Math.random()*.0004,wobble:Math.random()*Math.PI*2,al:.035+Math.random()*.07,pulse:Math.random()*Math.PI*2,pS:.01+Math.random()*.013}));
  const CH=['心','靑','道','水','命','0','1','∑','∂','λ','◈','⟨'];
  const PT=Array.from({length:50},()=>({x:Math.random(),bY:Math.random(),ch:CH[Math.floor(Math.random()*CH.length)],sz:8+Math.random()*10,sX:(Math.random()-.5)*.00006,bA:.008+Math.random()*.013,bF:.008+Math.random()*.015,bP:Math.random()*Math.PI*2,al:.045+Math.random()*.09,pu:Math.random()*Math.PI*2,pS:.007+Math.random()*.011,col:Math.random()<.6?'j':(Math.random()<.5?'g':'p')}));
  let t=0;
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight}
  function draw(){
    const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
    const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'rgba(7,13,20,1)');bg.addColorStop(.4,'rgba(10,19,30,1)');bg.addColorStop(.65,'rgba(12,22,36,1)');bg.addColorStop(1,'rgba(5,10,18,1)');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    for(let i=0;i<3;i++){const fy=H*(.30+i*.22+Math.sin(t*.06+i)*.02);const fg=ctx.createRadialGradient(W*.5,fy,0,W*.5,fy,W*.52);fg.addColorStop(0,`rgba(14,28,42,${.08+i*.015})`);fg.addColorStop(1,'rgba(7,13,20,0)');ctx.fillStyle=fg;ctx.fillRect(0,0,W,H)}
    const hg=ctx.createLinearGradient(0,H*.56,0,H*.70);hg.addColorStop(0,'rgba(94,196,176,0)');hg.addColorStop(.45,'rgba(94,196,176,.05)');hg.addColorStop(1,'rgba(94,196,176,0)');ctx.fillStyle=hg;ctx.fillRect(0,H*.56,W,H*.14);
    WV.forEach(w=>{w.ph+=w.speed;ctx.beginPath();ctx.moveTo(0,H*w.y);for(let x=0;x<=W;x+=6){const y=H*w.y+Math.sin(x*w.freq+w.ph)*w.amp+Math.sin(x*w.freq*1.4+w.ph*.55)*(w.amp*.36)+Math.sin(x*w.freq*.3+w.ph*1.1)*(w.amp*.20);ctx.lineTo(x,y)}ctx.strokeStyle=`rgba(94,196,176,${w.al})`;ctx.lineWidth=.9;ctx.stroke()});
    BB.forEach(b=>{b.y-=b.speed;b.wobble+=.018;b.pulse+=b.pS;if(b.y<-.01)b.y=1+Math.random()*.08;const px=(b.x+Math.sin(b.wobble)*.01)*W,py=b.y*H,a=b.al*(.6+.4*Math.sin(b.pulse));ctx.beginPath();ctx.arc(px,py,b.r,0,Math.PI*2);ctx.strokeStyle=`rgba(94,196,176,${a})`;ctx.lineWidth=.5;ctx.stroke()});
    PT.forEach(p=>{p.bP+=p.bF;p.pu+=p.pS;p.x+=p.sX;if(p.x>1.04)p.x=-.04;if(p.x<-.04)p.x=1.04;const py=(p.bY+Math.sin(p.bP)*p.bA)*H,a=p.al*(.5+.5*Math.sin(p.pu));const C={j:`rgba(94,196,176,${a})`,g:`rgba(200,168,75,${a})`,p:`rgba(155,95,192,${a})`};ctx.font=`${p.sz}px serif`;ctx.fillStyle=C[p.col];ctx.fillText(p.ch,p.x*W,py)});
    for(let i=0;i<4;i++){const wy=H*(.76+i*.05);ctx.beginPath();for(let x=0;x<=W;x+=4){const y=wy+Math.sin(x*.014+t*.22+i*.8)*4+Math.sin(x*.022+t*.16+i)*2.5;if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.strokeStyle=`rgba(94,196,176,${.035-i*.005})`;ctx.lineWidth=.65;ctx.stroke()}
    [.18,.45,.72].forEach((xr,i)=>{const bx=xr*W,fl=Math.sin(t*.8+i*1.8)*Math.sin(t*.25+i),a=Math.max(0,.010+fl*.008);const pg=ctx.createLinearGradient(bx,H*.15,bx,H*.88);pg.addColorStop(0,'rgba(94,196,176,0)');pg.addColorStop(.35,`rgba(94,196,176,${a})`);pg.addColorStop(.7,`rgba(94,196,176,${a*.22})`);pg.addColorStop(1,'rgba(94,196,176,0)');ctx.fillStyle=pg;ctx.fillRect(bx-1,H*.15,2,H*.73)});
    t+=.016;requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);resize();draw();
})();
</script>
